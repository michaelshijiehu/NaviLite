services:
  # 1. MySQL (NaviLite Storage + Test)
  navilite-db:
    image: mysql:8.0
    container_name: navilite-mysql
    restart: always
    environment:
      MYSQL_DATABASE: navilite
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_ROOT_HOST: '%'
    ports:
      - '3306:3306'
    volumes:
      - ./docker/mysql/data:/var/lib/mysql

  # 2. PostgreSQL
  navilite-postgres:
    image: postgres:15
    container_name: navilite-postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: root
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data

  # 3. MongoDB
  navilite-mongo:
    image: mongo:latest
    container_name: navilite-mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - ./docker/mongo/data:/data/db

  # 4. Redis
  navilite-redis:
    image: redis:latest
    container_name: navilite-redis
    restart: always
    ports:
      - '6379:6379'